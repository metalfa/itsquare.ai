<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Purple gradient background square with rounded corners -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F32CC"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Chat bubble body -->
  <rect x="10" y="12" width="44" height="30" rx="8" fill="white" opacity="0.95"/>
  <!-- Chat bubble tail -->
  <path d="M14 42 L10 52 L22 44" fill="white" opacity="0.95"/>

  <!-- "IT" text inside the bubble -->
  <!-- I -->
  <rect x="20" y="20" width="4" height="14" rx="1.5" fill="#6C47FF"/>
  <!-- T - horizontal bar -->
  <rect x="30" y="20" width="14" height="4" rx="1.5" fill="#6C47FF"/>
  <!-- T - vertical stem -->
  <rect x="35" y="20" width="4" height="14" rx="1.5" fill="#6C47FF"/>
</svg>
